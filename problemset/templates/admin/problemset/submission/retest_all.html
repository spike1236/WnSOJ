{% extends "admin/base_site.html" %}
{% load i18n admin_urls %}

{% block content %}
  <div id="content-main">
    <h1>Retest all submissions</h1>
    <p>This will queue a bounded batch of submissions that are <strong>not</strong> currently in queue (<code>verdict=IQ</code>).</p>
    <p>Submit again to queue another batch.</p>

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="submit-row">
        <input type="submit" value="Queue retest" class="default" />
        <a class="button cancel-link" href="{% url 'admin:problemset_submission_changelist' %}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
